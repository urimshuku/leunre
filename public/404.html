<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>LEUNRE</title>
    <script>
      // GitHub Pages SPA fallback: redirect unknown paths to index.
      (function redirectToIndex(location) {
        const pathSegmentsToKeep = 1;
        const newPath =
          location.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") +
          "/?/" +
          location.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
          (location.search ? "&" + location.search.slice(1).replace(/&/g, "~and~") : "") +
          location.hash;
        location.replace(newPath);
      }(window.location));
    </script>
  </head>
  <body></body>
</html>
